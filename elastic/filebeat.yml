filebeat.inputs:
  # Suricata EVE JSON
  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve.json
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      log_source: suricata
    fields_under_root: false
    tags: ["suricata"]

  # Zeek logs
  - type: log
    enabled: true
    paths:
      - /var/log/zeek/conn.log
      - /var/log/zeek/dns.log
      - /var/log/zeek/http.log
      - /var/log/zeek/ssl.log
    fields:
      log_source: zeek
    fields_under_root: false
    tags: ["zeek"]

# ============================================================
# Output to Logstash
# ============================================================
output.logstash:
  hosts: ["logstash:5044"]

# ============================================================
# Logging
# ============================================================
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
