# SOC Detection Lab — Logstash main pipeline
# Receives logs from Filebeat (5044) and Suricata syslog (5514)

input {
  # Filebeat input — Cowrie honeypot, Suricata, Zeek
  beats {
    port => 5044
    type => "filebeat"
  }

  # Direct syslog input from Suricata
  udp {
    port => 5514
    codec => json_lines
    type => "suricata-syslog"
  }
}

filter {
  # ============================================================
  # Cowrie honeypot events
  # ============================================================
  if [fields][log_source] == "cowrie" {
    mutate {
      add_tag => ["cowrie", "honeypot"]
      add_field => { "[soc][category]" => "honeypot" }
    }

    # Geo-enrich the source IP
    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "[soc][geoip]"
      }
    }

    # MITRE ATT&CK tagging
    if [eventid] == "cowrie.login.failed" {
      mutate {
        add_field => { "[soc][mitre_technique]" => "T1110.001" }
      }
    }
    if [eventid] == "cowrie.login.success" {
      mutate {
        add_field => { "[soc][mitre_technique]" => "T1078" }
      }
    }
    if [eventid] == "cowrie.command.input" {
      mutate {
        add_field => { "[soc][mitre_technique]" => "T1059" }
      }
    }
  }

  # ============================================================
  # Suricata events
  # ============================================================
  if [type] == "suricata-syslog" or [fields][log_source] == "suricata" {
    mutate {
      add_tag => ["suricata", "ids"]
      add_field => { "[soc][category]" => "network_ids" }
    }

    if [alert][severity] == 1 {
      mutate {
        add_field => { "[soc][severity_label]" => "high" }
      }
    }
  }

  # ============================================================
  # Zeek events
  # ============================================================
  if [fields][log_source] == "zeek" {
    mutate {
      add_tag => ["zeek", "network_metadata"]
      add_field => { "[soc][category]" => "network_metadata" }
    }
  }

  # ============================================================
  # Add timestamp normalization
  # ============================================================
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  # Send everything to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "soc-%{[soc][category]}-%{+YYYY.MM.dd}"
    manage_template => true
    template_overwrite => true
  }

  # Debug: also send to stdout (remove in production)
  # stdout { codec => rubydebug }
}
