---
title: Credential Stuffing — Multiple Usernames from Single Source
id: b3e91f4d-7a55-4c1b-9e22-8f3d1e5a7b4c
status: stable
description: |
  Detects credential stuffing attacks where a single source IP attempts logins
  with many different usernames in a short time window. Distinguishes from
  brute force (single user, many passwords) by tracking username diversity.
  Common pattern from botnet-driven credential reuse attacks.
references:
  - https://attack.mitre.org/techniques/T1110/004/
  - https://owasp.org/www-community/attacks/Credential_stuffing
author: dram64
date: 2026/04/27
correlation:
  type: value_count
  rules:
    - cowrie_failed_login
  group-by:
    - src_ip
  timespan: 10m
  condition:
    gte: 10
    field: username
tags:
  - attack.credential-access
  - attack.t1110.004
  - attack.initial-access
falsepositives:
  - Vulnerability scanner running through default credential lists
  - Internal red team exercise (should be tagged in advance)
level: high
fields:
  - src_ip
  - username
  - timestamp
