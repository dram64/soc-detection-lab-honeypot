title: Cowrie Failed Login
id: a1c8f2d6-4e3b-4a91-9d77-2c5e8b1f0a3d
status: stable
description: Base detection — a single failed login event captured by the Cowrie honeypot.
references:
  - https://attack.mitre.org/techniques/T1110/004/
author: dram64
date: 2026/04/27
name: cowrie_failed_login
logsource:
  category: authentication
  product: cowrie
detection:
  selection:
    eventid: 'cowrie.login.failed'
  condition: selection
