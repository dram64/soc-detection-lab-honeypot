name: dashboard-ci

# Lint + tests + tf validate for the SOC honeypot dashboard subproject.
# Mirror of Diamond IQ's ci.yml adapted for: nested layout under dashboard/,
# pip-based Python (no uv.lock), and SOC's two-stack terraform layout.

on:
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard-ci.yml'
      - '.github/workflows/dashboard-backend-deploy.yml'
      - '.github/workflows/dashboard-tf-plan.yml'
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard-ci.yml'
      - '.github/workflows/dashboard-backend-deploy.yml'
      - '.github/workflows/dashboard-tf-plan.yml'

permissions:
  contents: read

concurrency:
  group: dashboard-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & format (ruff)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: dashboard/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: pytest
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: dashboard/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e '.[dev]'

      - name: Run pytest (262 tests expected)
        run: pytest -v

  terraform-validate:
    name: Terraform validate (${{ matrix.dir }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dir:
          - dashboard/infrastructure/terraform/environments/dev
          - dashboard/infrastructure/terraform/stacks/edge-shippers-credentials
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ~1.7
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform -chdir=${{ matrix.dir }} fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform -chdir=${{ matrix.dir }} init -backend=false -input=false

      - name: terraform validate
        run: terraform -chdir=${{ matrix.dir }} validate

  tflint:
    name: tflint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: latest

      # No .tflint.hcl in the repo yet — first run uses default rules.
      # If output is too noisy, drop a config at dashboard/infrastructure/terraform/.tflint.hcl.
      - name: tflint --recursive
        working-directory: dashboard/infrastructure/terraform
        run: |
          tflint --init
          tflint --recursive
