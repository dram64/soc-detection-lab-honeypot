###############################################################################
# fluent-bit on the Pi: tails Cowrie's structured JSON, ships gzipped batches
# to s3://dram-soc-honeypot-ingest/raw/cowrie/...
#
# Path on disk                : /etc/fluent-bit/fluent-bit.conf
# Storage / position DB       : /var/lib/fluent-bit/
# Credentials                 : /etc/fluent-bit/aws-credentials (0600, fluent-bit:fluent-bit)
# Service                     : soc-fluent-bit.service (systemd)
#
# Buffering: filesystem-backed, 1 GB cap. fluent-bit's S3 output retries
# indefinitely on network failure; on ISP outage the queue absorbs locally
# until egress restores. ADR-002 transport / ADR-010 tool choice.
###############################################################################

[SERVICE]
    flush                     5
    daemon                    off
    log_level                 info
    storage.path              /var/lib/fluent-bit/storage
    storage.sync              normal
    storage.checksum          on
    storage.backlog.mem_limit 16M
    parsers_file              /etc/fluent-bit/parsers.conf

[INPUT]
    name              tail
    path              /home/cowrie/cowrie/var/log/cowrie/cowrie.json
    parser            cowrie_json
    tag               cowrie.event
    db                /var/lib/fluent-bit/cowrie.db
    db.sync           normal
    refresh_interval  5
    rotate_wait       30
    storage.type      filesystem
    skip_long_lines   on

# Stamp the host + source so the Lambda can discriminate even if S3 keys
# get re-organized later. Cheap and self-documenting.
[FILTER]
    name      record_modifier
    match     cowrie.event
    record    fluent_host pi
    record    fluent_source cowrie

[OUTPUT]
    name                      s3
    match                     cowrie.event
    bucket                    dram-soc-honeypot-ingest
    region                    us-east-1
    s3_key_format             /raw/cowrie/date=%Y-%m-%d/host=pi/cowrie-%Y%m%dT%H%M%S-$UUID.json.gz
    use_put_object            true
    compression               gzip
    upload_timeout            60s
    total_file_size           8M
    retry_limit               false
    storage.total_limit_size  1G
    json_date_key             false
