# Cowrie writes one JSON event per line with an ISO 8601 microsecond timestamp.
# fluent-bit's `json` parser handles the structure; we only need to point it
# at Cowrie's timestamp field so the record's logical time is the event time
# and not the tail-read time.
[PARSER]
    name        cowrie_json
    format      json
    time_key    timestamp
    time_format %Y-%m-%dT%H:%M:%S.%LZ
    time_keep   on
