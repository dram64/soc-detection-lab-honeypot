# HAProxy log line shape (after `option logasap` + the custom log-format in
# dashboard/edge/haproxy/haproxy.cfg.snippet, with rsyslog's
# RSYSLOG_FileFormat template producing the microsecond-precision leading
# timestamp):
#
#   2026-05-07T00:55:01.948594+00:00 host haproxy[12345]: client=104.174.33.78:8728 frontend_port=22 duration=67180 bytes_uploaded=2169 bytes_downloaded=1880 status=cD
#
# The leading timestamp (microsecond precision) is the load-bearing key for
# correlation per ADR-010. fluent-bit captures it as the record's logical
# time AND keeps a copy in the body's `time` field via `Time_Keep on`, so
# the Lambda can read it as a string and parse to microseconds.

[PARSER]
    # NB: numeric fields use [+-]?\d+ because HAProxy with `option logasap`
    # prefixes in-progress values with `+` (e.g. `duration=+0` while the
    # session is still open). The Lambda's int() parses `+0` correctly;
    # the regex just has to admit the prefix.
    name        haproxy_kv
    format      regex
    regex       ^(?<time>[^ ]+) (?<host>[^ ]+) (?<process>haproxy)\[(?<pid>\d+)\]: client=(?<client_ip>[0-9.]+):(?<client_port>\d+) frontend_port=(?<frontend_port>\d+) duration=(?<duration>[+-]?\d+) bytes_uploaded=(?<bytes_uploaded>[+-]?\d+) bytes_downloaded=(?<bytes_downloaded>[+-]?\d+) status=(?<status>\S+)
    time_key    time
    time_format %Y-%m-%dT%H:%M:%S.%L%z
    time_keep   on
    types       client_port:integer frontend_port:integer duration:integer bytes_uploaded:integer bytes_downloaded:integer pid:integer
