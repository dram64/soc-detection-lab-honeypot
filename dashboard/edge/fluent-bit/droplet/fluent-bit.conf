###############################################################################
# fluent-bit on the DigitalOcean droplet: tails HAProxy's connection log,
# ships gzipped batches to s3://dram-soc-honeypot-ingest/raw/haproxy/...
#
# Path on disk          : /etc/fluent-bit/fluent-bit.conf
# Storage / position DB : /var/lib/fluent-bit/
# Credentials           : /etc/fluent-bit/aws-credentials (0600, fluent-bit:fluent-bit)
# Service               : soc-fluent-bit.service (systemd)
#
# HAProxy is configured to log key=value pairs with a microsecond-precision
# timestamp ("option logasap" + log-format using %[date(us)] — see
# dashboard/edge/haproxy/haproxy.cfg.snippet). The microsecond timestamp is
# load-bearing for the Lambda's correlation window (ADR-010 §Decision).
###############################################################################

[SERVICE]
    flush                     5
    daemon                    off
    log_level                 info
    storage.path              /var/lib/fluent-bit/storage
    storage.sync              normal
    storage.checksum          on
    storage.backlog.mem_limit 16M
    parsers_file              /etc/fluent-bit/parsers.conf

[INPUT]
    name              tail
    path              /var/log/haproxy.log
    parser            haproxy_kv
    tag               haproxy.conn
    db                /var/lib/fluent-bit/haproxy.db
    db.sync           normal
    refresh_interval  5
    rotate_wait       30
    storage.type      filesystem
    skip_long_lines   on

[FILTER]
    name      record_modifier
    match     haproxy.conn
    record    fluent_host droplet
    record    fluent_source haproxy

[OUTPUT]
    name                      s3
    match                     haproxy.conn
    bucket                    dram-soc-honeypot-ingest
    region                    us-east-1
    s3_key_format             /raw/haproxy/date=%Y-%m-%d/host=droplet/haproxy-%Y%m%dT%H%M%S-$UUID.json.gz
    use_put_object            true
    compression               gzip
    upload_timeout            60s
    total_file_size           8M
    retry_limit               false
    storage.total_limit_size  1G
    json_date_key             false
